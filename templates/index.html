<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MTube</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    <nav
      class="navbar navbar-expand navbar-dark bg-dark border-bottom border-secondary"
    >
      <div class="container-fluid">
        <a
          class="navbar-brand d-flex align-items-center"
          href="#"
          id="brandBtn"
        >
          <i class="bi bi-play-btn-fill text-primary me-2 fs-4"></i>
          <span class="fw-bold">MTube</span>
        </a>
        <div class="navbar-nav ms-4">
          <a class="nav-link active" id="navHomeBtn" href="#">Home</a>
          <a class="nav-link" id="navPlaylistsBtn" href="#">Playlists</a>
          <a class="nav-link" id="navHistoryBtn" href="#">History</a>
        </div>
      </div>
    </nav>

    <div class="app-container">
      <div id="homeView" class="main-content d-flex flex-column container">
        <h2 class="mb-4 mt-3" id="homeSectionTitle">
          <i class="bi bi-music-note-list me-2"></i>Music Search
        </h2>
        <div class="mb-4">
          <div class="input-group mb-2 shadow-sm">
            <input
              type="text"
              id="searchInput"
              class="form-control border-secondary bg-dark text-light"
              placeholder="Search artists, songs, or podcasts... (Press Enter to search, clear to view top tracks)"
            />
            <button class="btn btn-primary" type="button" id="searchBtn">
              <i class="bi bi-search"></i>
            </button>
          </div>
          <div class="text-muted" style="font-size: 0.8rem">
            Shortcuts: <b>Space</b> (Play/Pause), <b>Arrows ⬅/➡</b> (Prev/Next),
            <b>Arrows ⬆/⬇</b> (Volume), <b>M</b> (Mute)
          </div>
        </div>
        <div id="loading" class="text-center d-none my-4">
          <div class="spinner-border text-primary" role="status"></div>
        </div>
        <div
          id="resultsContainer"
          class="list-group scrollable flex-grow-1 pb-4"
        ></div>
      </div>

      <div
        id="historyView"
        class="main-content d-flex flex-column container d-none"
      >
        <h3 class="mb-4 mt-3">
          <i class="bi bi-clock-history me-2"></i>Listening History
        </h3>
        <div
          id="historyContainer"
          class="list-group scrollable flex-grow-1 pb-4"
        ></div>
      </div>

      <div
        id="playlistsView"
        class="main-content d-flex container d-none p-0 h-100"
      >
        <div
          class="col-4 border-end border-secondary p-3 d-flex flex-column h-100"
        >
          <h4 class="mb-3 mt-1">Your Playlists</h4>
          <button
            class="btn btn-outline-primary btn-sm mb-3 fw-bold"
            id="openCreatePlaylistModalBtn"
          >
            + New Playlist
          </button>
          <div
            id="playlistSidebarList"
            class="list-group scrollable flex-grow-1"
          ></div>
        </div>
        <div class="col-8 p-3 d-flex flex-column h-100">
          <div
            class="d-flex justify-content-between align-items-center mb-3 mt-1"
          >
            <h3 id="currentPlaylistTitle">Favorites</h3>
            <button class="btn btn-primary" id="playAllBtn">
              <i class="bi bi-play-fill me-1"></i> Play All
            </button>
          </div>
          <div
            id="playlistTracksContainer"
            class="list-group scrollable flex-grow-1 pb-4"
          ></div>
        </div>
      </div>

      <div id="sidebar" class="sidebar bg-dark border-start border-secondary">
        <ul
          class="nav nav-tabs w-100 d-flex border-secondary"
          role="tablist"
          style="font-size: 0.85rem"
        >
          <li class="nav-item flex-fill text-center">
            <button
              class="nav-link active w-100 px-1 border-0"
              id="upNextTabBtn"
            >
              UP NEXT
            </button>
          </li>
          <li class="nav-item flex-fill text-center">
            <button class="nav-link w-100 px-1 border-0" id="lyricsTabBtn">
              LYRICS
            </button>
          </li>
        </ul>
        <div class="flex-grow-1 position-relative mt-2">
          <div
            id="upNextWrapper"
            class="position-absolute w-100 h-100 top-0 start-0 d-flex flex-column"
          >
            <div
              class="d-flex align-items-center px-2 pb-2 flex-shrink-0"
              id="queueModeWrapper"
            >
              <div class="filter-chips flex-grow-1" id="queueModeFilters">
                <button class="chip-btn" id="queueModeAllBtn">All</button>
                <button class="chip-btn" id="queueModeFamiliarBtn">
                  Familiar
                </button>
                <button class="chip-btn active" id="queueModeDiscoverBtn">
                  Discover
                </button>
              </div>
              <div
                class="form-check form-switch ms-2 mb-0 d-flex align-items-center"
                title="Auto-Shuffle New Selections"
              >
                <input
                  class="form-check-input mt-0 me-2"
                  type="checkbox"
                  role="switch"
                  id="autoShuffleSwitch"
                  checked
                />
                <i
                  class="bi bi-shuffle text-light"
                  style="font-size: 0.9rem"
                ></i>
              </div>
            </div>

            <div
              id="upNextContainer"
              class="list-group scrollable flex-grow-1 border-top border-secondary pt-2"
            >
              <div class="p-4 text-center text-muted">Queue is empty</div>
            </div>
          </div>
          <div
            id="lyricsContainer"
            class="scrollable position-absolute w-100 h-100 top-0 start-0 p-4 d-none"
          >
            <div class="text-center text-muted">
              Select a song to view lyrics
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Player Bar -->
    <div
      class="player-bar p-3 d-flex align-items-center justify-content-between bg-dark border-top border-secondary"
    >
      <div class="d-flex align-items-center" style="width: 30%">
        <div id="playerThumbnailContainer">
          <i class="bi bi-music-note-beamed fs-3 text-secondary ms-2 me-3"></i>
        </div>
        <div class="overflow-hidden me-2">
          <div id="nowPlayingText" class="text-truncate fw-bold">
            No song selected
          </div>
          <small
            id="nowPlayingUploader"
            class="text-muted text-truncate d-block"
          ></small>
        </div>
        <div
          class="d-flex align-items-center flex-shrink-0 d-none"
          id="playerActions"
        >
          <button
            class="action-btn fav-btn ms-1"
            id="favActionBtn"
            title="Favorite"
          >
            <i class="bi bi-heart" id="playerFavIcon"></i>
          </button>
          <div class="dropdown ms-1">
            <button class="action-btn" type="button" data-bs-toggle="dropdown">
              <i class="bi bi-three-dots-vertical"></i>
            </button>
            <ul class="dropdown-menu dropdown-menu-dark shadow-sm">
              <li>
                <button class="dropdown-item" id="upvoteActionBtn">
                  <i class="bi bi-arrow-up-circle me-2 text-primary"></i>Upvote
                </button>
              </li>
              <li>
                <button class="dropdown-item" id="downvoteActionBtn">
                  <i class="bi bi-arrow-down-circle me-2 text-warning"></i
                  >Downvote
                </button>
              </li>
              <li>
                <button class="dropdown-item" id="addPlaylistActionBtn">
                  <i class="bi bi-collection-play me-2"></i>Add to Playlist
                </button>
              </li>
              <li><hr class="dropdown-divider" /></li>
              <li>
                <button class="dropdown-item text-danger" id="trashActionBtn">
                  <i class="bi bi-trash3 me-2"></i>Trash Track
                </button>
              </li>
            </ul>
          </div>
        </div>
      </div>

      <div class="d-flex flex-column align-items-center" style="width: 40%">
        <div class="d-flex align-items-center mb-1">
          <button class="control-btn mx-2" id="prevBtn">
            <i class="bi bi-skip-backward-fill"></i>
          </button>
          <button class="control-btn mx-3 fs-3" id="playPauseBtn">
            <i id="playIcon" class="bi bi-play-fill"></i>
          </button>
          <button class="control-btn mx-2" id="nextBtn">
            <i class="bi bi-skip-forward-fill"></i>
          </button>
        </div>
        <div class="d-flex w-100 align-items-center">
          <span
            id="currentTime"
            class="small me-2 text-muted"
            style="min-width: 35px; text-align: right"
            >0:00</span
          >
          <input
            type="range"
            id="seekSlider"
            class="form-range flex-grow-1"
            value="0"
            step="0.1"
          />
          <span
            id="durationTime"
            class="small ms-2 text-muted"
            style="min-width: 35px"
            >0:00</span
          >
        </div>
      </div>

      <div
        class="d-flex align-items-center justify-content-end"
        style="width: 30%"
      >
        <button
          class="control-btn mx-2 text-secondary"
          id="toggleSidebarBtn"
          title="Toggle Sidebar"
        >
          <i class="bi bi-layout-sidebar-reverse fs-5"></i>
        </button>
        <i
          id="volumeIcon"
          class="bi bi-volume-up-fill fs-5 me-2 ms-3"
          style="cursor: pointer"
        ></i>
        <input
          type="range"
          id="volumeSlider"
          class="form-range"
          style="width: 100px"
          min="0"
          max="1"
          step="0.05"
          value="1"
        />
      </div>
    </div>

    <!-- Modals -->
    <div
      class="modal fade"
      id="createPlaylistModal"
      tabindex="-1"
      data-bs-theme="dark"
    >
      <div class="modal-dialog modal-dialog-centered text-light">
        <div class="modal-content bg-dark">
          <div class="modal-header border-secondary">
            <h5 class="modal-title">Create New Playlist</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <input
              type="text"
              id="newPlaylistNameInput"
              class="form-control bg-dark text-light border-secondary"
              placeholder="Enter playlist name"
            />
          </div>
          <div class="modal-footer border-secondary">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>
            <button
              type="button"
              class="btn btn-primary"
              id="submitCreatePlaylistBtn"
            >
              Create
            </button>
          </div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="playlistModal"
      tabindex="-1"
      data-bs-theme="dark"
    >
      <div class="modal-dialog modal-dialog-centered text-light">
        <div class="modal-content bg-dark">
          <div class="modal-header border-secondary">
            <h5 class="modal-title">Select Playlist</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <select
              id="playlistSelect"
              class="form-select bg-dark text-light border-secondary mb-3"
            ></select>
          </div>
          <div class="modal-footer border-secondary">
            <button
              type="button"
              class="btn btn-primary"
              id="saveToPlaylistBtn"
            >
              Save
            </button>
          </div>
        </div>
      </div>
    </div>

    <audio id="audioElement" preload="metadata"></audio>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/player.js"></script>
  </body>
</html>
